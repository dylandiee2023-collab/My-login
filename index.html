<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - Login & Sign Up</title>
    <!-- Modern Font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for the Google Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ================= GENERAL STYLES (CSS) ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #3b82f6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Main Card Container */
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 430px;
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(30, 64, 175, 0.2);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Form Header */
        .form-header h2 {
            color: #1e3a8a;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }

        .form-header p {
            color: #64748b;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Input Form Elements */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #1e40af;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            color: #334155;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        /* Forgot Password Link */
        .forgot-pass {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 25px;
        }

        .forgot-pass a {
            color: #3b82f6;
            font-size: 13px;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-pass a:hover {
            text-decoration: underline;
        }

        /* Submit Buttons */
        .btn-submit {
            width: 100%;
            background-color: #1e40af;
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 12px rgba(30, 64, 175, 0.25);
        }

        .btn-submit:hover {
            background-color: #1d4ed8;
        }

        /* Center Divider (or) */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #94a3b8;
            font-size: 14px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        /* Google Button */
        .btn-google {
            width: 100%;
            background-color: #ffffff;
            color: #334155;
            border: 2px solid #e2e8f0;
            padding: 12px;
            font-size: 15px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .btn-google i {
            color: #ea4335; /* Google Red */
            font-size: 18px;
        }

        .btn-google:hover {
            background-color: #f8fafc;
            border-color: #cbd5e1;
        }

        /* Form Footer Toggle Link */
        .form-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: #64748b;
        }

        .form-footer button {
            background: none;
            border: none;
            color: #1e40af;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .form-footer button:hover {
            text-decoration: underline;
        }

        /* JavaScript Toggle Utility */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- ================= LOGIN FORM ================= -->
        <div id="loginBox">
            <div class="form-header">
                <h2>Welcome Back</h2>
                <p>login to continue</p>
            </div>
            
            <form id="actualLoginForm" onsubmit="handleFormSubmit(event, 'Login')">
                <div class="input-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="johndoe@gmail.com" required>
                </div>
                
                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                
                <div class="forgot-pass">
                    <a href="#">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn-submit">Sign In</button>
            </form>
            
            <div class="divider">or</div>
            
            <button class="btn-google" onclick="continueWithGoogle()">
                <i class="fab fa-google"></i>
                Continue with Google
            </button>
            
            <div class="form-footer">
                Don't have an account? <button onclick="switchForm('signup')">Sign up here</button>
            </div>
        </div>


        <!-- ================= SIGN UP FORM ================= -->
        <div id="signupBox" class="hidden">
            <div class="form-header">
                <h2>Create Account</h2>
                <p>Get started by creating your account below</p>
            </div>
            
            <form id="actualSignupForm" onsubmit="handleFormSubmit(event, 'Sign Up')">
                <div class="input-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe" required>
                </div>

                <div class="input-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" placeholder="johndoe@gmail.com" required>
                </div>
                
                <div class="input-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-submit" style="background-color: #3b82f6;">Create Account</button>
            </form>
            
            <div class="divider">or</div>
            
            <button class="btn-google" onclick="continueWithGoogle()">
                <i class="fab fa-google"></i>
                Continue with Google
            </button>
            
            <div class="form-footer">
                Already have an account? <button onclick="switchForm('login')">log in here</button>
            </div>
        </div>

    </div>

    <!-- ================= JAVASCRIPT LOGIC ================= -->
    <script>
        // Smoothly switch between Login and Sign Up views
        function switchForm(formType) {
            const loginBox = document.getElementById('loginBox');
            const signupBox = document.getElementById('signupBox');
            
            if (formType === 'signup') {
                loginBox.classList.add('hidden');
                signupBox.classList.remove('hidden');
            } else {
                signupBox.classList.add('hidden');
                loginBox.classList.remove('hidden');
            }
        }

        // Triggered when clicking 'Continue with Google'
        function continueWithGoogle() {
            console.log("Google Authentication initiated...");
            alert("You clicked 'Continue with Google'. This handles the frontend action. You will need to link your backend API or an identity provider like Firebase Auth / Google OAuth 2.0 to make this functional.");
        }

        // Intercept form submissions
        function handleFormSubmit(event, type) {
            event.preventDefault(); // Stop the page from reloading
            
            if (type === 'Login') {
                const email = document.getElementById('loginEmail').value;
                console.log("User attempting login with Email:", email);
                alert("Login form submitted successfully!");
            } else if (type === 'Sign Up') {
                const name = document.getElementById('signupName').value;
                console.log("New user signing up as:", name);
                alert("Account created successfully (Frontend Mockup)!");
            }
        }
    </script>
</body>
</html>
